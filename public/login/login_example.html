<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style_login.css">
</head>
<body>

  <div class="card">

    <div class="brand">✦ Nexus</div>

    <div class="tabs">
      <a href="#" id="login-form-link" class="active">Sign in</a>
      <a href="#" id="register-form-link">Register</a>
    </div>

    <form id="login-form" action="https://youtube.com/" method="get">
      <input type="text"     name="username" id="username" placeholder="Username" autocomplete="off">
      <input type="password" name="password" id="password" placeholder="Password">
      <button type="submit"  id="login-submit">Sign in</button>
    </form>

    <form id="register-form" action="https://phpoll.com/register/process" method="post" style="display:none;">
      <input type="text"     name="username2" id="username2" placeholder="Username">
      <input type="email"    name="email"     id="email"     placeholder="Email">
      <input type="password" name="password2" id="password2" placeholder="Password">
      <button type="submit"  id="register-submit">Create account</button>
    </form>

  </div>

  <script src="//code.jquery.com/jquery-1.11.1.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
